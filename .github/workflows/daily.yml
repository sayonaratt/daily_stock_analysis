name: 每日A股选股
on:
  workflow_dispatch:
  schedule:
    - cron: "30 9 * * 1-5"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install tushare pandas
      - name: Run script
        run: python stock.py
